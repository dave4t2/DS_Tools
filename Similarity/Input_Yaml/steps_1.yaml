test_case: PAM-SMOKE-001
payload_ref: FISTesting/payloads/pain001_base.json

# Preconditions (from requirements.md ## Preconditions):
#   Default payload: EUR, amount 1000.00, single_cover routing, no magic
#   debtorAccount — fault_injection = None, every downstream leg follows its
#   deterministic OK callback.
#   No overrides or omit clauses are required.

test_data:
  pre_submit_statuses: [RECEIVED, VALIDATED, ENRICHED, PENDING_SUBMISSION]
  post_submit_statuses: [PACS008_EMITTED, POSTED, ACKNOWLEDGED, SETTLED, REPAIR]

steps:

  # ── shared.R1 ─────────────────────────────────────────────────────────────
  # WHEN a well-formed payment request is POSTed to /payments, the system
  # shall accept it with HTTP 202 and return a summary containing id and
  # reference.
  - action: inject_payment
    params:
      payload_ref: FISTesting/payloads/pain001_base.json
      # No overrides: base template already carries EUR / 1000.00 / single_cover.
    assert:
      keyword: assert_http_status
      params:
        expected: 202
    verifies: [shared.R1]

  # ── shared.R2 (JSON API channel) ──────────────────────────────────────────
  # WHILE the payment has been accepted but not yet released to CSM, the
  # system shall report its status as one of
  # {RECEIVED, VALIDATED, ENRICHED, PENDING_SUBMISSION} on the JSON API.
  # Poll until PENDING_SUBMISSION is reached, then assert the status is
  # within the pre-submit allowed set.
  - action: wait_for_payment_status
    params:
      allowed: [PENDING_SUBMISSION]
      timeout: 30.0
    assert:
      keyword: assert_payment_status_in
      params:
        allowed: [RECEIVED, VALIDATED, ENRICHED, PENDING_SUBMISSION]
    verifies: [shared.R2]

  # ── shared.R2 (fis.business.events Kafka channel) ─────────────────────────
  - action: search_payment_kafka
    assert:
      keyword: assert_payment_status_in
      params:
        allowed: [RECEIVED, VALIDATED, ENRICHED, PENDING_SUBMISSION]
    verifies: [shared.R2]

  # ── shared.R2 (operator UI channel) ───────────────────────────────────────
  - action: search_payment_ui
    assert:
      keyword: assert_ui_payment_status_in
      params:
        allowed: [RECEIVED, VALIDATED, ENRICHED, PENDING_SUBMISSION]
    verifies: [shared.R2]

  # ── shared.R3 ─────────────────────────────────────────────────────────────
  # WHILE the payment is in PENDING_SUBMISSION, the system shall accept the
  # operator submit-to-csm action with HTTP 202.
  - action: submit_to_csm
    assert:
      keyword: assert_http_status
      params:
        expected: 202
    verifies: [shared.R3]

  # ── shared.R4 ─────────────────────────────────────────────────────────────
  # WHEN submit-to-csm is accepted, the system shall transition the payment
  # out of PENDING_SUBMISSION into the post-submit pipeline
  # {PACS008_EMITTED, POSTED, ACKNOWLEDGED, SETTLED, REPAIR}.
  - action: wait_for_payment_status
    params:
      allowed: [PACS008_EMITTED, POSTED, ACKNOWLEDGED, SETTLED, REPAIR]
      timeout: 30.0
    assert:
      keyword: assert_payment_status_in
      params:
        allowed: [PACS008_EMITTED, POSTED, ACKNOWLEDGED, SETTLED, REPAIR]
    verifies: [shared.R4]

  # ── shared.R5 + shared.R6 ─────────────────────────────────────────────────
  # shared.R5: WHEN the payment reaches SETTLED, the system shall publish a
  #            settlement business event to fis.business.events within 60 s.
  # shared.R6: WHILE the payment is in SETTLED, the system shall report this
  #            status on the JSON API.
  # Polling the JSON API for SETTLED within the 60 s timeout exercises both:
  # the timing bound on R5 and the API-channel observation of R6.
  - action: wait_for_payment_status
    params:
      allowed: [SETTLED]
      timeout: 60.0
    assert:
      keyword: assert_payment_status_in
      params:
        allowed: [SETTLED]
    verifies: [shared.R5, shared.R6]

  # ── shared.R5 (Kafka confirmation) ────────────────────────────────────────
  # Confirm the settlement business event is present on fis.business.events.
  - action: search_payment_kafka
    assert:
      keyword: assert_payment_status_in
      params:
        allowed: [SETTLED]
    verifies: [shared.R5]

  # ── shared.R7 ─────────────────────────────────────────────────────────────
  # WHILE the payment is in SETTLED, the system shall report this status on
  # the operator UI detail page.
  - action: search_payment_ui
    assert:
      keyword: assert_ui_payment_status_in
      params:
        allowed: [SETTLED]
    verifies: [shared.R7]
